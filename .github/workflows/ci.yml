name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: typecheck · lint · test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run typecheck
      - run: npm run lint
      # Unit tests are intentionally not gated yet — the existing harness
      # has stale .mjs scaffolds without `describe` blocks; bringing them
      # back is a separate cleanup. E2E (Playwright) needs WebGPU which
      # Ubuntu runners don't expose; run locally with `npm run test:e2e`.
